version: '3.8'

services:

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    networks:
      - relay-network
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  # ── Postgres Shards ───────────────────────────────────────────────────────
  postgres-0:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ReLay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - '5435:5432'
    volumes:
      - './postgres/init.sql:/docker-entrypoint-initdb.d/init.sql'
      - 'pg0-data:/var/lib/postgresql/data'
    networks:
      - relay-network
    restart: unless-stopped

  postgres-1:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ReLay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - '5433:5432'
    volumes:
      - './postgres/init.sql:/docker-entrypoint-initdb.d/init.sql'
      - 'pg1-data:/var/lib/postgresql/data'
    networks:
      - relay-network
    restart: unless-stopped

  postgres-2:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ReLay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - '5434:5432'
    volumes:
      - './postgres/init.sql:/docker-entrypoint-initdb.d/init.sql'
      - 'pg2-data:/var/lib/postgresql/data'
    networks:
      - relay-network
    restart: unless-stopped

  # ── Kafka KRaft Cluster ───────────────────────────────────────────────────
  # KRaft mode — no Zookeeper needed
  # All 3 brokers are both brokers AND controllers (combined mode)
  # Generate CLUSTER_ID first:
  #   docker run --rm confluentinc/cp-kafka:7.5.0 kafka-storage random-uuid
  # Then replace CLUSTER_ID below with your generated UUID

  kafka-1:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka-1
    container_name: relay-kafka-1
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093'
      KAFKA_LISTENERS: 'INTERNAL://kafka-1:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://kafka-1:29093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka-1:29092,EXTERNAL://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 100
      KAFKA_LOG_RETENTION_HOURS: 24
      CLUSTER_ID: 'dDlOtegISN-JfC_Kglfg4g'
    volumes:
      - kafka1-data:/var/lib/kafka/data
    networks:
      - relay-network
    restart: unless-stopped

  kafka-2:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka-2
    container_name: relay-kafka-2
    ports:
      - '9093:9093'
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093'
      KAFKA_LISTENERS: 'INTERNAL://kafka-2:29092,EXTERNAL://0.0.0.0:9093,CONTROLLER://kafka-2:29093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka-2:29092,EXTERNAL://localhost:9093'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 100
      KAFKA_LOG_RETENTION_HOURS: 24
      CLUSTER_ID: 'dDlOtegISN-JfC_Kglfg4g'
    volumes:
      - kafka2-data:/var/lib/kafka/data
    networks:
      - relay-network
    restart: unless-stopped

  kafka-3:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka-3
    container_name: relay-kafka-3
    ports:
      - '9094:9094'
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093'
      KAFKA_LISTENERS: 'INTERNAL://kafka-3:29092,EXTERNAL://0.0.0.0:9094,CONTROLLER://kafka-3:29093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka-3:29092,EXTERNAL://localhost:9094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 100
      KAFKA_LOG_RETENTION_HOURS: 24
      CLUSTER_ID: 'dDlOtegISN-JfC_Kglfg4g'
    volumes:
      - kafka3-data:/var/lib/kafka/data
    networks:
      - relay-network
    restart: unless-stopped

  # ── Kafka UI — visualize topics, messages, consumer lag ──────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: relay-kafka-ui
    ports:
      - '8080:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: relay-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    networks:
      - relay-network
    restart: unless-stopped

  # ── pgAdmin ───────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    networks:
      - relay-network

volumes:
  pg0-data:
  pg1-data:
  pg2-data:
  kafka1-data:
  kafka2-data:
  kafka3-data:

networks:
  relay-network:
    driver: bridge